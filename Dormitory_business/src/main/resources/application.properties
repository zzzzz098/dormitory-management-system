#Tomcat port
server.port=9091
#mysql
spring.datasource.url=jdbc:mysql://localhost:3306/dormitory?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#file upload
file.upload-dir=${user.dir}/springboot/src/main/resources/files/
#file upload size limit
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
# LLM fallback for Assistant: prefer environment variables in deployment.
# LLM_API_KEY=your-key
# LLM_BASE_URL=https://your-openai-compatible-host
# LLM_MODEL=your-model-name
